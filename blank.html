<!DOCTYPE html>
<html styleh="font-size: 16px;" lang="en-gb">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="content-type" content="text/html; charset=UTF8">
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Blank</title>
    <link id="manifestLink" rel="manifest" href="" />
    <meta name="viewport" content="height=device-height, viewport-fit=cover,
      width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
    <meta name="description" content="IP Internet Phone">
    <link rel="icon" href="data:,">
    <meta name="google" content="notranslate"/>
    <style>
      html {
        font-size: 16px;
        height: calc(100% - 4rem);
        padding: 2rem;
        background-color: black;
        color: white;
      }
      body {
        position: relative;
        display: grid;
        &>* {
          grid-row: 1;
          grid-column: 1;
          align-self: center;
          justify-self: center;
        }
        font-size: 1.2rem;
        height: 100%;
        margin: 0;
        padding: 0;
      }
      body:not([style*="--iframe"]) > * {
        display: none;
      }
      .scanner {
        display: grid;
        &>* {
          grid-row: 1;
          grid-column: 1;
          align-self: center;
          justify-self: center;
        }
        align-self: center;
        justify-self: center;
        position: relative;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      .scanner > video {
        position: relative;
        width: 100%;
        height: 100%;
        overflow: hidden;
        object-fit: contain;
        object-position: center;
      }
      svg {
        width: 80%;
        height: 80%;
        display: block;
      }
    </style>
    <script>
      {
        let g = HTMLCanvasElement.prototype.getContext;
        if(!g.dummy){
          HTMLCanvasElement.prototype.getContext=function(t,o={}){
            if(t==="2d")o={willReadFrequently:true,...o};
            return g.call(this,t,o);
          };
          HTMLCanvasElement.prototype.getContext.dummy=1;
        }
      };
      var state = {
        qrcreate: async (resolve, command, message) => {
          const create = async message => {
            let qrString = await QRCode.toString(message, {
              type: "svg",
              scale: 4,
              errorCorrectionLevel: "H",
              margin: 4,
              width: 420,
              color: {
                dark: "#000000",
                light: "#ffffff"
              },
              version: 15
            });
            return qrString.replace(
              "<svg",
              '<svg preserveAspectRatio="xMidYMid meet"'
            );
          };
          if (typeof(QRCode) == 'undefined') {
            await runScript("/3rd-party/qrcode.min.js");
            console.log('qrcreated');
          } else console.log('already loaded');
          let qrString = '';
          if (command == 'qr') {
            qrString = await create(message);
            //resolve(qrString);
          }
          document.querySelector('.create').innerHTML = qrString
          resolve(qrString);
        },
        qrscan: async resolve => {
          if (typeof(QRScanner) == 'undefined') {
            QRScanner = (await import("/3rd-party/qr-scanner.min.js")).default;
            console.log('qrscan');
          } else console.log('already loaded');
          let video = document.querySelector("video");
          const cfgErr = err => {if (err != "No QR code found") console.warn("decode error", err)}; // qrerror
          const cfg = {onDecodeError: cfgErr, returnDetailedScanResult: true, highlightScanRegion: true, highlightCodeOutline: true};
          let chunks = [], numRead = 0, action, first = true;
          const qrScan = new QRScanner(video, async result => { // ret = (type, data) => handler(type, data);
            let data = result.data, index = data.indexOf("@");
            if (index == -1) return resolve(qrScan, 'qrmessage', data);
            let meta = data.substring(0, index), args = meta.split(",");
            data = data.substring(index); 
            if (args.lengh == 3 && !isNaN(args[0] + args[1])) return resolve(qrScan, 'qrmessage', data);
            let [pos, noOfChunks, command] = [parseInt(args[0]), parseInt(args[1]), args[2]];
            if (pos < 0 || pos >= noOfChunks) return resolve(qrScan, 'qrmessage', data);
            if (noOfChunks != chunks.length) {
              chunks = new Array(noOfChunks);
              numRead = 0;
            }
            if (chunks[pos]) return;  // no need to notify handler until done
            numRead++;
            chunks[pos] = data;
            if (pos == 0) action = command;
            if (numRead == noOfChunks) {
              console.log("got ACTION", action);
              qrScan.stop();
              qrScan = null;
              setTimeout(_ => {
                const message = chunks.splice(0, noOfChunks).join("");
                chunks = new Array();
                numRead = 0;
                console.log('got coded message', action, message);
                // TODO: choose based on command (remmber size in on our side)
                // maybe check if a hander is available otherwise output into the document
                // can send handler(command, message)
                return resolve(qrScan, action, data);
                //document.open(); document.write(message); document.close();
              }, 0);
            } else console.log('Input', noOfChunks, numRead, pos); // no need to notify hadler until done
          }, cfg);
          qrScan.start();
          return qrScan;
        }
      };
      const runScript = async (src, type = 'url') => new Promise(resolve => {
        const code = document.createElement("script");
        const remove = _ => {
          let sc = document.scripts[document.scripts.length - 1];
          sc.parentElement.removeChild(sc);
        }
        if (type == 'url') {
          code.addEventListener('load',  _ => remove(resolve('loaded')), {once: true});
          code.addEventListener('error', _ => remove(resolve({type: 'error', stack: e})), {once: true});
          code.src = src;
        } else  {
          code.resolve = resolve;
          code.textContent = src + `
            {
              const script = document.scripts[document.scripts.length -1];
              const resolve = script.resolve;
              delete script.resolve;
              script.parentElement.removeChild(script);
              resolve('loaded');
            }`;
          setTimeout(_ => resolve({type: 'error', stack: 'UNKNOWN'}), 100);
        }
        document.documentElement.appendChild(code);
      });
      function runner(type, content, handler) {
        let u = "undefined";
        if (type == "qrcreate" && typeof(QRCode) == u || type == "qrscan" && typeof(QRScanner) == u) {
          const code = b.contentDocument.createElement("script");
          const remove = _ => {
            let sc = document.scripts[document.scripts.length - 1];
            sc.parentElement.removeChild(sc);
          }
          code.addEventListener('load',  _ => remove(state[type](handler)), {once: true});
          code.addEventListener('error', _ => remove(state[type]({type: 'error', handler, stack: e})), {once: true});
          code.textContent = content;
          document.documentElement.appendChild(code);
        };
      }
    </script>
  </head>
  <body>
    <div class="scanner" sstyle="--iframe: 1">
      <video id=video></video>
      <div class="create scanner"></div>
      <div style="padding: 1rem; flex-direction: column; display: flex; width: fit-content; height: auto; border: 1px solid yellow;place-self: center; gap: 1rem;">
        <h3 style=" margin: 0; text-align: center; line-height: 1;">QR Create</h3>
        <button>Ready</button>
        <button>Feedback</button>
        <button>Cancel</button>
      </div>
    </div>
  </body>
