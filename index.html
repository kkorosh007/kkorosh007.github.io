    <script>
      {

        if(!g.dummy){
          HTMLCanvasElement.prototype.getContext=function(t,o={}){

            return g.call(this,t,o);

        }
      };
      //{
        const makeCall = async to => {
          let peers = new Map();
          peers = ChatRoom('peter', false, peers, {trickleIce: false, sendMessage: async msg => {
            const iframe = await iframeView();

            `;
            iframe.contentWindow.state.qrcreate(_ => _, 'SDP', JSON.stringify(msg));
          }});
          await peers.makeCall('mary')
        };
        const acceptOffer = async id => {
          const iframe = await iframeView();console.log('adasdas')
          iframe.contentWindow.document.querySelector('.qr_overlay').innerHTML = `
            <div style="font-size: 1.5rem">Scan</div>
            <button onpointerdown="state.clear(true);">Exit</button>
          `;
          iframe.contentWindow.state.qrscan((qrscan, message) => { console.log('got scan', message)});
        };

        const ChatRoom = (clientId, httpListen = true, peers = new Map(), signaling = {trickleIce: false, sendMessage: async msg => {
          console.log('sending', msg);
          if (!httpListen) {
            const id = msg.to;
            xxx = msg;
            msg = new URLSearchParams({ id, msg: (JSON.stringify(msg)) }).toString();
            const div1 = document.body.appendChild(document.createElement('div'));
            div1.style.cssText = 'background-color: rgba(30, 30, 30, .7); color: white; position: absolute; display: grid; place-items: center; left: 0px; top:0px; width: 100%; height: 100%;';
            div1.innerText = 'Click to connect';
            console.log('adding div');
            div1.addEventListener('click', _ => {
              const www = window.open('http://192.168.1.119:8000/send?autoanswer=1#' + encodeURIComponent(msg), 'dspatcher');
              window.addEventListener('message', (event) => {
                document.body.removeChild(div1);
                peers.get(id).receiveMessage(JSON.parse(event.data.message));
              }, {once: true});
            }, {once: true});
          } else await fetch(`send?${new URLSearchParams({ id: msg.to, msg: (JSON.stringify(msg)) }).toString()}`)
        }}) => {
          const rTime = (i, d = new Date(i)) => String(d.getHours()).padStart(2, '0') + ':' +
            String(d.getMinutes()).padStart(2, '0') + ':' +
            String(d.getSeconds()).padStart(2, '0') + ':' +
            String(d.getMilliseconds()).padStart(3, '0');
          const createPeer = (peerId, signal) => {
            let makingOffer = false;
            //const pc = new RTCPeerConnection({ sdpSemantics: 'unified-plan', iceCandidatePoolSize: 5, iceServers: [{ urls: 'stun:stun.l.google.com:19302' }], bundlePolicy: 'max-bundle' });
            const pc = new RTCPeerConnection({ sdpSemantics: 'unified-plan', iceCandidatePoolSize: 5, iceServers: [], bundlePolicy: 'max-bundle' });
            pc.remoteCommand = new Map();
            const v = pc.v = document.createElement('video');
            pc.signal = signal;
            pc.trickleIce = signal.trickleIce ?? true;
            pc.ontrack = event => {
              const stream = event.streams[0] ?? new MediaStream([event.track]);
              v.srcObject = stream;
            };
            pc.onicecandidate = e => {
              const candidate = e.candidate;
              console.log('Ice candidate', rTime(performance.timeOrigin + performance.now()), e);
              if ((pc.trickleIce && candidate)) {
                pc.signal.sendMessage({from: clientId, to: peerId, type: 'SDP', sdp: { candidate }})
              }
            }
            pc.onicegatheringstatechange = async event => {
              if (!pc.trickleIce && pc.iceGatheringState === 'complete') {
                console.log('ice gathering state', pc.iceGatheringState);
                signal.sendMessage({from: clientId, to: peerId, type: 'SDP', sdp: {description: pc.localDescription}});
                pc.trickleIce = true;
              }
            };
            pc.onnegotiationneeded = async e => {
              makingOffer = true;
              await pc.setLocalDescription();
              if (pc.trickleIce) pc.signal.sendMessage({from: clientId, to: peerId, type: 'SDP', sdp: {description: pc.localDescription}});
              makingOffer = false;
            };
            pc.onconnectionstatechange = _ => {
              const state = pc.connectionState;
              if (state === 'disconnected' || state === 'failed' || state === 'closed') {
                pc.dc.close();
                peers.delete(peerId);
                pc.onconnectionstatechange = null;
              } else console.log('onconnectionstatechange', clientId, peerId, state);
            };
            pc.ondatachannel = event => {
              let dc = pc.dc = event.channel;
              dc.binaryType = 'arraybuffer';
              dc.onopen = _ => {
                pc.signal = signal = {
                  sendMessage: msg => {
                    console.log('DC Signaling', pc.trickleIce, clientId, peerId, msg);
                    pc.dc.send(JSON.stringify(msg));
                  }
                };
              };
              dc.addEventListener('message', e => pc.receiveMessage(JSON.parse(e.data)));
            };
            pc.receiveMessage = async msg => {
              if (msg.type && msg.to != clientId) {
                if (msg.type == 'CALL') return createPeer(msg.to, pc.signal).makeCall(msg.to);
                if (msg.to != peerId && peers.has(msg.to)) peers.get(msg.to).signal.sendMessage(msg);
                else console.error('error cannot find peer to send message to', clientId, peerId, msg);
              } else {
                if (msg.type === 'SDP') {
                  if (msg.sdp.description) {
                    const description = msg.sdp.description, offerCollision = description.type === 'offer' && (makingOffer || pc.signalingState !== 'stable')
                    if (!(msg.to < msg.from) && offerCollision) return
                    const peer = peers.has(msg.from) ? peers.get(msg.from) : createPeer(msg.from, pc.signal);
                    await peer.setRemoteDescription(description);
                    if (description.type === 'offer') {
                      await peer.setLocalDescription();
                      if (pc.trickleIce) signal.sendMessage({from: clientId, to: peerId, type: 'SDP', sdp: {description: peer.localDescription}});
                    };
                  } else await pc.addIceCandidate(msg.sdp.candidate);
                } else userHandler(msg);
              }
            };
            peers.clientId = clientId;
            peers.set(peerId, pc);
            return pc;
          };
          const remoteCall = (peerId, ...command) => new Promise(resolve => {
            const name = command[0];
            command = {msg: {func: name, args: command.slice(1)}, type: 'command', from: clientId, to: peerId};
            peers.get(peerId).remoteCommand.set(name, resolve);
            peers.get(peerId).signal.sendMessage(command);
          });
          const enumCameras = async () => {
            const closeStream = stream => stream.getTracks().forEach(t => t.stop()), tmp = await navigator.mediaDevices.getUserMedia({ video: true });
            closeStream(tmp);
            const devices = await navigator.mediaDevices.enumerateDevices(), cameras = [];
            cameras.currentIndex = -1;
            for (const device of devices) {
              if (device.kind === 'videoinput') {
                try {
                  const stream = await navigator.mediaDevices.getUserMedia({video: { deviceId: { exact: device.deviceId } }});
                  const track = stream.getVideoTracks()[0];
                  cameras.push({id: device.deviceId, label: device.label, settings: track.getSettings(), capabilities: track.getCapabilities()});
                  closeStream(stream);
                } catch (e) {}
              }
            }
            cameras.currentIndex = cameras.length ? 0 : -1;
            return cameras;
          };
          const makeCall = async peerId => {
            const pc = createPeer(peerId, signaling);
            pc.ondatachannel({channel: pc.createDataChannel('chat')});
          };
          const userHandler = async msg => {
            if (msg.type == 'command') {
              const command = msg.msg;
              if (command.result) {
                const handler = peers.get(msg.from).remoteCommand.get(command.func);
                peers.get(msg.from).remoteCommand.delete(command.func);
                handler(command.result);
              } else {
                command.result = await peers[command.func](...command.args);
                if (command.result == undefined) command.result = {};
                msg.msg = command;
                const ref = peers.get(msg.from), t = msg.from;
                msg.from = msg.to;
                msg.to = t;
                ref.signal.sendMessage(msg);
              };
            } else console.log('userHandler got',clientId, msg);
          };
          const listenForMessages = async (peerId, sessionId) => {
            const response = await fetch(`/stream?id=${peerId}&session=${sessionId}`);
            const reader = response.body.getReader(), decoder = new TextDecoder('utf-8');
            while (true) {
              const { value, done } = await reader.read();
              if (done) break;
              const chunk = decoder.decode(value, { stream: true });
              let msg = '';
              try { msg = JSON.parse(chunk); } catch(e) {continue};
              if (peers.has(msg.from)) await peers.get(msg.from).receiveMessage(msg);
              else await createPeer(msg.from, signaling).receiveMessage(msg);
            };
          };
          if (httpListen) listenForMessages(clientId, clientId + '-123');
          peers.cameras = [];
          peers.activeStream = null;
          peers.createPeer = createPeer;
          peers.makeCall = makeCall;
          peers.remoteCall = remoteCall;
          peers.enumCameras = enumCameras;
          peers.applyConstraints = async (trackKind, constraint) => {
            const track = trackKind == 'video' ? peers.activeStream.getVideoTracks()[0] : peers.activeStream.getAudioTracks()[0];
            return await track.applyConstraints(constraint);
          }
          peers.getSettings = trackKind => {
            try {
              const track = trackKind == 'video' ? peers.activeStream.getVideoTracks()[0] : peers.activeStream.getAudioTracks()[0];
              return track.getSettings()
            } catch (e) {return e.message}
          }
          peers.sendVideo = async (id, index) => {
            if (peers.cameras.length == 0) {
              try {
                peers.cameras = await peers.enumCameras();
              } catch(e) {
                alert('error: ' + e.message);
              }
            }
            if (peers.cameras.currentIndex && peers.cameras.currentIndex == -1) return;
            peers.cameras.currentIndex = (peers.cameras.currentIndex + index) % peers.cameras.length;
            const closeStream = stream => stream.getTracks().forEach(t => t.stop());
            if (peers.activeStream) closeStream(peers.activeStream);
            peers.activeStream = await navigator.mediaDevices.getUserMedia({video: { deviceId: peers.cameras[peers.cameras.currentIndex].id }, audit: false}), peer = peers.get(id);
            let found = false;
            for (const track of peers.activeStream.getTracks()) {
              for (const trans of peer.getTransceivers()) {
                if (trans.receiver.track.kind == track.kind) {
                  trans.sender.replaceTrack(track);
                  trans.direction = 'sendrecv';
                  found = true;
                  break;
                }
              };
              if (!found) peer.addTransceiver(track);
            };
            await peer.setLocalDescription();
            peer.signal.sendMessage({type: 'SDP', from: peers.clientId, to: id, sdp: {description: peer.localDescription}});
          };
          return peers; 
        };

        };
        const createAesKey = async _ => crypto.subtle.generateKey({ name: 'AES-GCM', length: 256 }, true, ['encrypt', 'decrypt']);
        const createAesKeyFromPassword = async (password, salt) => {
          if (!salt) salt = crypto.getRandomValues(new Uint8Array(16));
          const passwordBytes = new TextEncoder().encode(password);
          const passwordKey = await crypto.subtle.importKey('raw', passwordBytes, 'PBKDF2', false, ['deriveKey']);
          return await crypto.subtle.deriveKey(
            {
              name: 'PBKDF2',
              salt: salt,
              iterations: 100000,
              hash: 'SHA-256'
            },
            passwordKey,
            { name: 'AES-GCM', length: 256 },
            true,
            ['encrypt', 'decrypt']
          );
        };
        const exportKey = async key => new Uint8Array(await crypto.subtle.exportKey('raw', key));
        const importKey = async rawBytes => crypto.subtle.importKey('raw', rawBytes, { name: 'AES-GCM' }, true, ['encrypt', 'decrypt']);
        const encryptBytes = async (key, bytes) => {
          const iv = crypto.getRandomValues(new Uint8Array(12)), c = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, bytes);
          return { iv, ciphertext: new Uint8Array(c) };
        };
        const decryptBytes = async (key, iv, cipherBytes) => {
          return new Uint8Array(await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, cipherBytes));
        }
        const testAESPassword = async _ => {
          const p = prompt('Enter Password');
          const salt = crypto.getRandomValues(new Uint8Array(16));
          const keya = await createAesKeyFromPassword(p, salt);
          const keyb = await createAesKeyFromPassword(p, salt);
          const cp = await encryptBytes(keya, new Uint8Array([65, 66, 67]))
          try {
            const dp = await decryptBytes(keyb, cp.iv, cp.ciphertext);
            console.log('result', dp);
          } catch (e) { console.log('error'); }
        };
        const sendEncryptedRequest = async (message, endpoint) => {
          const keyBytes = new Uint8Array([0x01,0x23,0x45,0x67,0x89,0xab,0xcd,0xef,0x10,0x32,0x54,0x76,0x98,0xba,0xdc,0xfe,0x55,0xaa,0x55,0xaa,0x55,0xaa,0x55,0xaa,0xff,0xee,0xdd,0xcc,0xbb,0xaa,0x99,0x88]);
          const key = await crypto.subtle.importKey('raw', keyBytes, { name: 'AES-GCM' }, false, ['encrypt', 'decrypt']);
          const bytes = message instanceof Uint8Array ? message : new TextEncoder('utf-8').encode(message);
          return new TextDecoder('utf-8').decode(await postEncrypted('/encryptedcall', key, endpoint, bytes));
        };
        const iframeView = (container = document.body) => new Promise(resolve => {
          const iframe = document.createElement('iframe');
          iframe.onload = _ => resolve(iframe);
          iframe.src = '/blank.html';
          document.body.appendChild(iframe);
          Object.assign(iframe.style, {width: '100px', height: '100px', position: 'absolute', left: '0', bottom: '0'});
          //iframe.setAttribute("sandbox", "allow-scripts");
          container.appendChild(iframe);
        });
        let outputmarker = '';
        const runcode = async _ => {
          let t = document.querySelector('textarea'), code = t.value, marker = code.indexOf(outputmarker);
          let result = [], error = '', log = (...args) => result.push([...args]), tmp = '';
          if (marker == -1 || outputmarker == '') marker = code.length;
          else marker = marker - 3;
          code = code.substring(0, marker).replace(/\n+$/, '');
          outputmarker = `OUTPUT - ${new Date().toTimeString().slice(0,8)}`;
          try {await eval(`"use strict";(async _ => {${code}})()`)} catch(e) {
            error = 'ERROR: ' + e.message + '\n' + e.stack + '\n';
            const lines = error.split('\n');
            for (let i = 0; i < lines.length; i++) {
              line = lines[i];
              if (line.includes('at eval')) {
                const p1 = line.indexOf('eval'), p2 = line.indexOf(',', p1) + 2;
                lines[i] = line.substring(0, p1) + line.substring(p2);
                break;
              };
            };
            error = lines.join('\n');
          };
          result = result.join('\n') + '\n' + error;
          t.value = code + `


  ${outputmarker}

  ${result}
  `;
        };
        window.addEventListener('load', _ => {
          const b = document.querySelectorAll('button');
          b[0].addEventListener('click', runcode );
          b[1].addEventListener('click', inject );
          const t = document.querySelector('textarea');
          t.onkeydown = e => {
            if (e.key == "F3") {
              const p = t.selectionStart;
              e.preventDefault();
              runcode();
              t.selectionStart = t.selectionEnd = p;
            };
            if (e.key === "Tab") {
              e.preventDefault();
              let s = t.selectionStart, e2 = t.selectionEnd;
              t.value = t.value.slice(0, s) + "\t" + t.value.slice(e2);
              t.selectionStart = t.selectionEnd = s + 1;
            };
          };
          window.addEventListener('keypress', e => e.code == 'BracketRight' ? iframeView() : null, {once: true});
        }, {once: true});
