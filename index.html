<!DOCTYPE html>
<html style="font-size: 16px;" lang="en-gb">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="content-type" content="text/html; charset=UTF8">
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Mesh Net</title>
    <link id="manifestLink" rel="manifest" href="" />
    <meta name="viewport" content="height=device-height, viewport-fit=cover,
      width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
    <meta name="description" content="IP Internet Phone">
    <link rel="icon" href="data:,">
    <meta name="google" content="notranslate"/>
    <style>
      body, button {
        background-color: black;
        color: #ffffff;
      }
      button {
        padding: 2rem;
      }
    </style>
    <script>      
      const inject = _ => {
        const input = document.createElement('input');
        input.type = 'file';
        input.onchange = e => {console.log('changing');
          const file = input.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = _ => {console.log(1);
            if (document.location.href != 'localhost') {
              document.open();
              document.write(reader.result);
              document.close();
              /*saveAppState();*/
            }
          }
          reader.readAsText(file);
        }
        input.click();
      };
      inject();
    </script>
  </head>
  <body role="main">
    <button>Inject App</button>
  </body>
</html>
