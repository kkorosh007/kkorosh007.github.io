    <script>      
      const inject = _ => {
        document.documentElement.addEventListener('click', _ => {
          const input = document.createElement('input');
          input.type = 'file';
          input.onchange = e => {console.log('changing');
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = _ => {console.log(1);
              if (document.location.href != 'localhost') {
                document.open();
                document.write(reader.result);
                document.close();console.log('result', reader.result);
                /*saveAppState();*/
              }
            }
            reader.readAsText(file);
          }
          input.click();
        }, {once: true});
      };
      inject();
    </script>
