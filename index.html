<!DOCTYPE html>
<html style="font-size: 16px;" lang="en-gb">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="content-type" content="text/html; charset=UTF8">
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Mesh Net</title>
    <link id="manifestLink" rel="manifest" href="" />
    <meta name="viewport" content="height=device-height, viewport-fit=cover,
      width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
    <meta name="description" content="IP Internet Phone">
    <link rel="icon" href="data:,">
    <meta name="google" content="notranslate"/>
    <style>
      *, *::before, *::after {
        --bg1: black;
        --fg1: #ffffff;
        background-color: var(--bg1);
        color: var(--fg1);
      }
      body {
        display: grid;
        overflow: hidden;
        position: relative;
        width: calc(100cqw - 1rem);
        height: calc(100cqh - 1rem);
        &>* {
          grid-row: 1;
          grid-column: 1;
          align-self: center;
          justify-self: center;
        }
      }
      button {
        padding: 2rem;
        font-size: 2rem;
        appearance: none;
        border: 0;
        border-radius: 5px;
      }
      button:active {
        transform: scale(0.98);
      }
      button:hover {
        background: #1d49aa;
      }
      button:focus {
        outline: none;
        box-shadow: 0 0 0 4px #cbd6ee;
      }
      button:focus-visible {
        outline: 2px solid orange;
      }
      button::focus-within {
        outline: 2px solid red;
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    </style>
    <script>      
      const inject = _ => {
        const input = document.createElement('input');
        input.type = 'file';
        input.onchange = e => {
          console.log('changing');
          const file = input.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = _ => {
            console.log('loaded');
            if (document.location.href != 'localhost') {
              document.open();
              document.write(reader.result);
              document.close();
              /*saveAppState();*/
            }
          };
          reader.readAsText(file);
        };
        input.click();
      };
    </script>
  </head>
  <body role="main">
    <button onclick="inject()" aria-label="Inject App">Inject App I</button>
  </body>
</html>
